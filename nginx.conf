user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    upstream nextjs_upstream {
        server frontend:3000;
    }

    upstream laravel_upstream {
        server backend:9000;
    }

    server {
        listen 80;
        server_name localhost;
        root /var/www/public;
        index index.php;

        client_max_body_size 100M;

        # Serve trực tiếp các file tĩnh của Laravel bằng Nginx thông qua volume dùng chung
        location /storage/ {
            alias /var/www/public/storage/;
            try_files $uri $uri/ =404;
        }

        location /build/ {
            alias /var/www/public/build/;
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }

        location /assets/ {
            alias /var/www/public/assets/;
            try_files $uri $uri/ =404;
            expires 1y;
            add_header Cache-Control "public, no-transform";
        }

        # Định tuyến các request Admin, API và Auth sang Laravel PHP-FPM
        location ~ ^/(admin|api|sanctum|login|logout|register|password) {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Xử lý tệp tin PHP
        location ~ \.php$ {
            fastcgi_pass laravel_upstream;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_buffers 16 16k;
            fastcgi_buffer_size 32k;
        }

        # Proxy toàn bộ các trang khác sang Next.js Frontend
        location / {
            proxy_pass http://nextjs_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
